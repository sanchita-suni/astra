[project]
name = "astra-schemas"
version = "0.1.0"
description = "Astra — Pydantic v2 models. Single source of truth for the Opportunity Digest contract."
requires-python = ">=3.11,<3.13"
dependencies = [
    "pydantic>=2.7,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pydantic-to-typescript>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["astra_schemas"]
