[project]
name = "astra-core"
version = "0.1.0"
description = "Astra core algorithms — trust score, deadman switch math, proof-of-work extraction."
requires-python = ">=3.11,<3.13"
dependencies = [
    "pydantic>=2.7,<3.0",
    "astra-schemas",
    "astra-github-client",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["astra_core"]
